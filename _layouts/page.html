<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    
    {% seo %}
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-458TYS4K1L"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-458TYS4K1L');
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" id="highlight-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" id="highlight-dark" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#3b82f6' } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .prose-font { font-family: 'Lora', serif; }
        
        /* Code block styling */
        pre {
            border-radius: 0.75rem;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        code {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.7;
        }
        
        /* Inline code */
        p code, li code {
            background: #f1f5f9;
            color: #e11d48;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        
        .dark p code, .dark li code {
            background: #1e293b;
            color: #fb7185;
        }
        
        /* Prose content styling */
        .prose a {
            color: #3b82f6;
            text-decoration: underline;
            text-decoration-color: rgba(59, 130, 246, 0.3);
            text-underline-offset: 3px;
            transition: all 0.2s ease;
        }
        
        .prose a:hover {
            color: #2563eb;
            text-decoration-color: #2563eb;
        }
        
        .dark .prose a {
            color: #60a5fa;
            text-decoration-color: rgba(96, 165, 250, 0.3);
        }
        
        .dark .prose a:hover {
            color: #93c5fd;
            text-decoration-color: #93c5fd;
        }
        
        /* Blockquotes */
        .prose blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: #64748b;
        }
        
        .dark .prose blockquote {
            border-left-color: #60a5fa;
            color: #94a3b8;
        }
        
        /* Headings */
        .prose h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }
        
        .prose h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: #1e293b;
        }
        
        .dark .prose h2 {
            color: #f1f5f9;
        }
        
        .dark .prose h3 {
            color: #e2e8f0;
        }
        
        /* Lists */
        .prose ul, .prose ol {
            margin: 1.5rem 0;
            padding-left: 1.75rem;
        }
        
        .prose li {
            margin: 0.75rem 0;
        }
        
        /* Horizontal rule */
        .prose hr {
            margin: 3rem 0;
            border: 0;
            border-top: 1px solid #e2e8f0;
        }
        
        .dark .prose hr {
            border-top-color: #334155;
        }
        
        /* Paragraphs */
        .prose p {
            margin: 1.25rem 0;
        }
        
        /* Strong */
        .prose strong {
            color: #0f172a;
            font-weight: 600;
        }
        
        .dark .prose strong {
            color: #f1f5f9;
        }
        
        /* Tables */
        .prose table {
            width: 100%;
            margin: 2rem 0;
            border-collapse: collapse;
            font-size: 0.875rem;
            line-height: 1.5;
            overflow: hidden;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        
        .prose thead {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .dark .prose thead {
            background: #1e293b;
            border-bottom-color: #334155;
        }
        
        .prose th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }
        
        .dark .prose th {
            color: #f1f5f9;
        }
        
        .prose td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .dark .prose td {
            border-bottom-color: #334155;
        }
        
        .prose tbody tr {
            transition: background-color 0.15s;
        }
        
        .prose tbody tr:hover {
            background: #f8fafc;
        }
        
        .dark .prose tbody tr:hover {
            background: #1e293b;
        }
        
        .prose tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="{{ '/' | relative_url }}" class="flex items-center gap-3 group">
                <img src="/assets/images/favicon_io/favicon-32x32.png" alt="SherlockLiu Logo" class="w-8 h-8 transition-transform group-hover:scale-110">
                <span class="text-xl font-bold tracking-tight">{{ site.title }}</span>
            </a>
            <nav class="flex items-center gap-6">
                <ul class="hidden md:flex items-center gap-6 text-sm font-medium">
                    <li><a href="{{ '/' | relative_url }}" class="hover:text-brand transition">Home</a></li>
                    <li><a href="{{ '/blog' | relative_url }}" class="hover:text-brand transition">Blog</a></li>
                    <li><a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" class="hover:text-brand transition">LinkedIn</a></li>
                </ul>
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800">
                    <svg id="sun-icon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 18v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
                    <svg id="moon-icon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </nav>
        </div>
    </header>
    <main class="flex-grow max-w-4xl mx-auto px-4 py-12 w-full">
        <article class="prose prose-slate dark:prose-invert max-w-none">
            {% if page.title %}
            <h1 class="text-4xl font-bold mb-8">{{ page.title }}</h1>
            {% endif %}
            {{ content }}
        </article>
    </main>
    <footer class="border-t border-slate-200 dark:border-slate-800 py-12 bg-slate-50 dark:bg-slate-900/50">
        <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
            <div class="col-span-1 md:col-span-2 space-y-4">
                <h3 class="font-bold">{{ site.title }}</h3>
                <p class="text-slate-500 dark:text-slate-400 max-w-md">{{ site.description }}</p>
                <p class="text-xs text-slate-400">© {{ "now" | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
            </div>
            <div class="space-y-4">
                <h3 class="font-bold">Navigation</h3>
                <ul class="space-y-2 text-slate-500 dark:text-slate-400">
                    <li><a href="{{ '/blog' | relative_url }}" class="hover:text-brand transition">Blogs</a></li>
                    <li><a href="https://linkedin.com/in/{{ site.linkedin_username }}" class="hover:text-brand transition">LinkedIn</a></li>
                </ul>
            </div>
        </div>
    </footer>
    <script>
        // Initialize highlight.js
        hljs.highlightAll();
        
        // Theme toggling for both UI and code blocks
        const toggleBtn = document.getElementById('theme-toggle');
        const lightStyle = document.getElementById('highlight-light');
        const darkStyle = document.getElementById('highlight-dark');
        
        function updateHighlightTheme(isDark) {
            if (isDark) {
                lightStyle.disabled = true;
                darkStyle.disabled = false;
            } else {
                lightStyle.disabled = false;
                darkStyle.disabled = true;
            }
        }
        
        toggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateHighlightTheme(isDark);
        });
        
        // Set initial theme
        const isDarkMode = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDarkMode) {
            document.documentElement.classList.add('dark');
        }
        updateHighlightTheme(isDarkMode);
    </script>
</body>
</html>

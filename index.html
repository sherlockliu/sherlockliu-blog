---
layout: default
title: Home
---
<section class="space-y-12">
    <div class="max-w-2xl">
        <h1 class="text-4xl font-bold mb-4">Latest Insights</h1>
        <p class="text-slate-500 dark:text-slate-400">{{ site.description }}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        {% for post in site.posts limit:6 %}
        <article class="group">
            <a href="{{ post.url | relative_url }}">
                <div class="aspect-[16/9] overflow-hidden rounded-2xl bg-slate-100 dark:bg-slate-900 mb-4 shadow-sm">
                    <img src="{{ post.image | relative_url }}" alt="{{ post.title }}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <div class="space-y-2">
                    <div class="flex items-center gap-2 text-xs font-semibold text-brand uppercase tracking-widest">
                        {{ post.categories | first }}
                    </div>
                    <h2 class="text-xl font-bold group-hover:text-brand transition leading-tight">{{ post.title }}</h2>
                    <div class="flex items-center gap-3 text-sm text-slate-500 dark:text-slate-400">
                        <span>{{ post.date | date: "%b %d, %Y" }}</span>
                        <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                        <span>{{ post.read_time }}</span>
                    </div>
                </div>
            </a>
        </article>
        {% endfor %}
    </div>

    <div class="text-center pt-8">
        <a href="{{ '/blog' | relative_url }}" class="inline-flex items-center gap-2 font-semibold text-brand hover:underline">
            Show more articles
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
        </a>
    </div>
</section>
